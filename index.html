<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<div class="navbar">
    <a href="/">Home</a>
   
    <a href="/admin">Admin Login</a>
    <a href="#" onclick="toggleDark()">🌙</a>
<a href="/my_bookings">📋 My Bookings</a>
</div>

<div class="container">
    <h2>📚 Book Study Room</h2>

    <form action="/book" method="POST">
        Name: <input type="text" name="name" required minlength="3"><br>

Phone: <input type="text" name="phone" required pattern="[0-9 ]{10,13}" title="Enter phone number">

        <select name="room">
            {% for room in rooms %}
                {% if room[0] in booked %}
                    <option disabled>{{ room[1] }} (Booked ❌)</option>
                {% else %}
                    <option value="{{ room[0] }}">{{ room[1] }} (Available ✅)</option>
                {% endif %}
            {% endfor %}
        </select>

        <!-- 📅 Calendar style -->
        <input type="date" name="date" required>

        <button type="submit">Book</button>
    </form>
</div>

<script>
function toggleDark() {
    document.body.classList.toggle("dark");
}
</script>

<!DOCTYPE html>
<html>
<head>
<style>
body { font-family:Arial; background:#f4f6f9; }
.card { background:white; padding:20px; margin:20px; border-radius:10px; }
table { width:100%; border-collapse:collapse; }
th, td { padding:10px; text-align:center; }
th { background:#34495e; color:white; }
.btn { padding:5px 10px; background:red; color:white; text-decoration:none; }
</style>
</head>

<body>

<div class="card">
<h3>Add Room</h3>
<form method="POST" action="/add_room">
<input name="room_name" placeholder="Room Name" required>
<input name="capacity" placeholder="Capacity" required>
<button>Add</button>
</form>
</div>

<div class="card">
<table>
<tr><th>ID</th><th>Name</th><th>Capacity</th><th>Action</th></tr>

{% for r in rooms %}
<tr>
<td>{{ r[0] }}</td>
<td>{{ r[1] }}</td>
<td>{{ r[2] }}</td>
<td><a class="btn" href="/delete_room/{{ r[0] }}">Delete</a></td>
</tr>
{% endfor %}

</table>
</div>

<a href="/admin_dashboard">Back</a>

</body>
</html>

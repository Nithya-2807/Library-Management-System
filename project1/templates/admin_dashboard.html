<!DOCTYPE html>
<html>
<head>
<style>
body { font-family:Arial; background:#f4f6f9; }
.nav { background:#2c3e50; color:white; padding:15px; text-align:center; }
.card {
    background:white; margin:20px; padding:20px;
    border-radius:10px; box-shadow:0 4px 8px rgba(0,0,0,0.1);
}
.btn {
    padding:10px; background:#3498db; color:white;
    border-radius:5px; text-decoration:none;
}
</style>
</head>

<body>

<div class="nav">Admin Dashboard</div>

<div class="card">Rooms: {{ total_rooms }}</div>
<div class="card">Bookings: {{ total_bookings }}</div>
<div class="card">Pending: {{ pending }}</div>
<div class="card">Confirmed: {{ confirmed }}</div>

<div class="card">
    <a class="btn" href="/manage_rooms">Rooms</a>
    <a class="btn" href="/view">Bookings</a>
    <a class="btn" href="/students">Students</a>
    <a class="btn" href="/logout">Logout</a>
<a href="/">Home</a>
</div>

</body>
</html>
